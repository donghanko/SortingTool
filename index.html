<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>연맹 선발 계산기</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 200px; }
    button { margin-top: 10px; padding: 10px; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    .selected { background-color: #c8f7c5; }
    .sub { background-color: #fff3b0; }
    .out { background-color: #f7c5c5; }
  </style>
</head>
<body>
  <h2>연맹 선발 계산기</h2>
  <p>형식: 캐릭터명,전투력 (한 줄씩 입력)</p>
  <textarea id="inputData" placeholder="홍길동,12345\n김철수,98765"></textarea>
  <br>
  <button onclick="processData()">선발하기</button>

  <table id="resultTable">
    <thead>
      <tr>
        <th>순위</th>
        <th>캐릭터명</th>
        <th>전투력</th>
        <th>결과</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    function processData() {
      const input = document.getElementById('inputData').value.trim();
      const lines = input.split('\n');

      let players = lines.map(line => {
        const [name, power] = line.split(',');
        return {
          name: name.trim(),
          power: parseInt(power.trim())
        };
      });

      players.sort((a, b) => b.power - a.power);

      const tbody = document.querySelector('#resultTable tbody');
      tbody.innerHTML = '';

      players.forEach((p, index) => {
        let status = '';
        let className = '';

        if (index < 20) {
          status = '선발';
          className = 'selected';
        } else if (index < 30) {
          status = '교체';
          className = 'sub';
        } else {
          status = '탈락';
          className = 'out';
        }

        const row = `<tr class="${className}">
          <td>${index + 1}</td>
          <td>${p.name}</td>
          <td>${p.power}</td>
          <td>${status}</td>
        </tr>`;

        tbody.innerHTML += row;
      });
    }
  </script>
</body>
</html>
