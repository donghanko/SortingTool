<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연맹 선발 도구</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #0f172a;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 150px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      font-size: 14px;
      margin-top: 10px;
      background: #1e293b;
      color: white;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 20px;
    }

    .card {
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      font-weight: bold;
    }

    .selected { background: #16a34a; }
    .reserve { background: #eab308; color: black; }
    .excluded { background: #dc2626; }

    .tag {
      font-size: 12px;
      opacity: 0.8;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ 연맹 선발 도구</h1>
    <p>형식: <b>이름,전투력</b> (한 줄씩 입력)</p>

    <textarea id="input" placeholder="홍길동,12345\n김철수,98765"></textarea>

    <button onclick="process()">🚀 선발 실행</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function process() {
      const input = document.getElementById('input').value.trim();
      const lines = input.split('\n');

      let data = lines.map(line => {
        const [name, power] = line.split(',');
        return { name: name.trim(), power: parseInt(power) };
      }).filter(x => x.name && !isNaN(x.power));

      data.sort((a, b) => b.power - a.power);

      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '';

      data.forEach((p, i) => {
        const div = document.createElement('div');
        div.classList.add('card');

        if (i < 20) {
          div.classList.add('selected');
          div.innerHTML = `<span>${i+1}. ${p.name} (${p.power})</span><span class="tag">선발</span>`;
        } else if (i < 30) {
          div.classList.add('reserve');
          div.innerHTML = `<span>${i+1}. ${p.name} (${p.power})</span><span class="tag">교체</span>`;
        } else {
          div.classList.add('excluded');
          div.innerHTML = `<span>${i+1}. ${p.name} (${p.power})</span><span class="tag">탈락</span>`;
        }

        resultDiv.appendChild(div);
      });
    }
  </script>
</body>
</html>
